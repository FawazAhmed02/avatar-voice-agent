<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveTec InfoPoint</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07080F;
      --surface: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.07);
      --text: #E8EEFF;
      --muted: #5A6480;
      --accent: #818CF8;
      --listening: #34D399;
      --processing: #FBBF24;
      --speaking: #60A5FA;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(30,27,75,0.45), transparent),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(15,35,80,0.2), transparent);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ────────────────────────────────────── */
    header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,8,15,0.85);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, #4f46e5, #818CF8);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 16px rgba(129,140,248,0.35);
    }

    .brand-icon svg { width: 18px; height: 18px; fill: #fff; }

    .brand-name {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
    }

    .brand-sub {
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-top: 1px;
    }

    .conn-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
      transition: all 0.3s;
    }

    .conn-badge.connected { color: var(--listening); border-color: rgba(52,211,153,0.25); }
    .conn-badge.error     { color: #EF4444;          border-color: rgba(239,68,68,0.25);  }

    #conn-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .conn-badge.connected #conn-dot { animation: dot-pulse 2s ease-in-out infinite; }

    @keyframes dot-pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* ── Main layout ───────────────────────────────── */
    main {
      flex: 1;
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 24px 48px;
      gap: 28px;
    }

    /* ── Avatar section ────────────────────────────── */
    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .avatar-ring {
      position: relative;
      width: 260px;
      height: 260px;
    }

    #avatar-canvas {
      display: block;
      border-radius: 50%;
    }

    .ring-svg {
      position: absolute;
      inset: -18px;
      width: calc(100% + 36px);
      height: calc(100% + 36px);
      pointer-events: none;
      overflow: visible;
    }

    .r-base {
      fill: none;
      stroke: var(--listening);
      stroke-width: 1.5;
      opacity: 0.2;
      transition: stroke 0.5s;
    }

    .r-dash {
      fill: none;
      stroke: var(--listening);
      stroke-width: 2;
      opacity: 0.7;
      stroke-dasharray: 8 8;
      stroke-linecap: round;
      transition: stroke 0.5s;
      animation: spin 16s linear infinite;
      transform-origin: center;
    }

    .r-pulse {
      fill: none;
      stroke: var(--listening);
      stroke-width: 1.5;
      transition: stroke 0.5s;
      animation: radial-pulse 2.8s ease-out infinite;
      transform-origin: center;
      opacity: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes radial-pulse {
      0%   { r: 148; opacity: 0.55; }
      100% { r: 185; opacity: 0; }
    }

    /* ── Status bar ────────────────────────────────── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 36px;
    }

    #status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 20px;
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.2);
      transition: background 0.4s, border-color 0.4s;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--listening);
      transition: all 0.4s;
    }

    .pill-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* listening → animate */
    #status-pill.listening .pill-dot { animation: dot-pulse 1.4s ease-in-out infinite; }

    /* ── Wave bars (speaking only) ─────────────────── */
    #wave-bars {
      display: flex;
      align-items: center;
      gap: 3px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #wave-bars.visible { opacity: 1; }

    #wave-bars span {
      display: block;
      width: 3px;
      border-radius: 2px;
      background: var(--speaking);
      animation: bar 0.85s ease-in-out infinite;
    }

    #wave-bars span:nth-child(1) { height: 8px;  animation-delay: 0.00s; }
    #wave-bars span:nth-child(2) { height: 16px; animation-delay: 0.12s; }
    #wave-bars span:nth-child(3) { height: 24px; animation-delay: 0.24s; }
    #wave-bars span:nth-child(4) { height: 30px; animation-delay: 0.12s; }
    #wave-bars span:nth-child(5) { height: 24px; animation-delay: 0.36s; }
    #wave-bars span:nth-child(6) { height: 16px; animation-delay: 0.18s; }
    #wave-bars span:nth-child(7) { height: 8px;  animation-delay: 0.06s; }

    @keyframes bar {
      0%,100% { transform: scaleY(0.25); opacity: 0.5; }
      50%      { transform: scaleY(1);   opacity: 1;   }
    }

    /* ── Latency metrics ───────────────────────────── */
    #metrics {
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.5s;
      flex-wrap: wrap;
      justify-content: center;
    }
    #metrics.show { opacity: 1; }

    .m-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 52px;
    }
    .m-label {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .m-val {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
      transition: color 0.3s;
    }
    .m-stage.cached .m-val { color: var(--listening); }
    .m-stage.total  .m-val { color: var(--accent); }

    .m-div {
      width: 1px; height: 24px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ── Chat section ──────────────────────────────── */
    #chat-wrap {
      width: 100%;
      max-width: 620px;
      border-radius: 20px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .chat-header {
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .chat-header-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    #messages {
      padding: 16px;
      min-height: 120px;
      max-height: 280px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .empty-msg {
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
      padding: 16px 0;
      opacity: 0.7;
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: slide-in 0.22s ease;
    }

    .msg-row.user { flex-direction: row-reverse; }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-av {
      width: 26px; height: 26px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
    }

    .msg-av.user-av {
      background: rgba(96,165,250,0.15);
      color: var(--speaking);
      border: 1px solid rgba(96,165,250,0.2);
    }

    .msg-av.ai-av {
      background: rgba(129,140,248,0.12);
      color: var(--accent);
      border: 1px solid rgba(129,140,248,0.2);
    }

    .bubble {
      max-width: 72%;
      padding: 9px 14px;
      font-size: 0.875rem;
      line-height: 1.55;
      border-radius: 16px;
    }

    .msg-row.user .bubble {
      background: rgba(96,165,250,0.12);
      border: 1px solid rgba(96,165,250,0.18);
      border-bottom-right-radius: 4px;
      color: #C5DEFF;
    }

    .msg-row.assistant .bubble {
      background: rgba(129,140,248,0.07);
      border: 1px solid rgba(129,140,248,0.15);
      border-bottom-left-radius: 4px;
      color: #D4D8F8;
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 3a7 7 0 1 1-7 7 7 7 0 0 1 7-7zm0 2a5 5 0 1 0 5 5 5 5 0 0 0-5-5zm0 2a3 3 0 1 1-3 3 3 3 0 0 1 3-3z"/></svg>
      </div>
      <div>
        <div class="brand-name">WaveTec</div>
        <div class="brand-sub">InfoPoint Assistant</div>
      </div>
    </div>
    <div class="conn-badge" id="conn-badge">
      <div id="conn-dot"></div>
      <span id="conn-label">Connecting…</span>
    </div>
  </header>

  <main>
    <div class="avatar-section">
      <div class="avatar-ring">
        <canvas id="avatar-canvas" width="260" height="260"></canvas>
        <svg class="ring-svg" viewBox="0 0 296 296">
          <circle class="r-base"  cx="148" cy="148" r="145"/>
          <circle class="r-dash"  cx="148" cy="148" r="142"/>
          <circle class="r-pulse" cx="148" cy="148" r="145"/>
        </svg>
      </div>

      <div class="status-row">
        <div id="status-pill" class="listening">
          <div class="pill-dot"></div>
          <span id="status-text">Listening</span>
        </div>
        <div id="wave-bars">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div id="metrics">
      <div class="m-stage" id="ms-stt"><span class="m-label">STT</span><span class="m-val" id="mv-stt">—</span></div>
      <div class="m-div"></div>
      <div class="m-stage" id="ms-rag"><span class="m-label">RAG</span><span class="m-val" id="mv-rag">—</span></div>
      <div class="m-div"></div>
      <div class="m-stage" id="ms-llm"><span class="m-label">LLM</span><span class="m-val" id="mv-llm">—</span></div>
      <div class="m-div"></div>
      <div class="m-stage" id="ms-tts"><span class="m-label">TTS</span><span class="m-val" id="mv-tts">—</span></div>
      <div class="m-div"></div>
      <div class="m-stage total" id="ms-total"><span class="m-label">Total</span><span class="m-val" id="mv-total">—</span></div>
    </div>

    <div id="chat-wrap">
      <div class="chat-header">
        <div class="chat-header-dot"></div>
        Conversation
      </div>
      <div id="messages">
        <div class="empty-msg">Say something to begin…</div>
      </div>
    </div>
  </main>

<script>
// ─── Canvas setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('avatar-canvas');
const ctx    = canvas.getContext('2d');
const W = 260, H = 260, CX = 130, CY = 128;

// ─── Viseme table ─────────────────────────────────────────────────────────────
const VISEMES = {
  sil: { open: 0.00, wide: 1.00 },
  PP:  { open: 0.02, wide: 0.95 },
  FF:  { open: 0.07, wide: 0.88 },
  TH:  { open: 0.08, wide: 0.88 },
  DD:  { open: 0.22, wide: 1.00 },
  kk:  { open: 0.18, wide: 1.00 },
  CH:  { open: 0.30, wide: 0.82 },
  SS:  { open: 0.12, wide: 0.88 },
  nn:  { open: 0.16, wide: 1.00 },
  RR:  { open: 0.32, wide: 0.80 },
  aa:  { open: 0.88, wide: 1.10 },
  E:   { open: 0.50, wide: 1.16 },
  ih:  { open: 0.34, wide: 1.10 },
  oh:  { open: 0.64, wide: 0.72 },
  ou:  { open: 0.50, wide: 0.62 },
};

// ─── Mouth state ──────────────────────────────────────────────────────────────
const mouth = { open: 0, wide: 1, tOpen: 0, tWide: 1 };

function setViseme(name, amp) {
  const v = VISEMES[name] || VISEMES.sil;
  const s = isNaN(amp) ? 1 : Math.max(0.55, 0.55 + amp * 0.8);
  mouth.tOpen = v.open * s;
  mouth.tWide = v.wide;
}

// ─── Blink state ─────────────────────────────────────────────────────────────
const blink = { t: 0, active: false, nextAt: 0 };
function scheduleBlink() { blink.nextAt = performance.now() + 2200 + Math.random() * 3800; }
scheduleBlink();

function tickBlink(now) {
  if (!blink.active && now >= blink.nextAt) { blink.active = true; blink.t = 0; }
  if (blink.active) {
    blink.t += 0.16;
    if (blink.t >= 1) { blink.active = false; blink.t = 0; scheduleBlink(); }
  }
}

function blinkScale() {
  return blink.active ? 1 - Math.sin(blink.t * Math.PI) : 1;
}

// ─── Breathing ────────────────────────────────────────────────────────────────
let breathPhase = 0;
function breathY() { return Math.sin(breathPhase) * 2.5; }

// ─── Eye look ─────────────────────────────────────────────────────────────────
let lookX = 0, lookY = 0, lookTargetX = 0, lookTargetY = 0, lookTimer = 0;

function tickLook(now) {
  if (now > lookTimer) {
    lookTargetX = (Math.random() - 0.5) * 0.6;
    lookTargetY = (Math.random() - 0.5) * 0.4;
    lookTimer = now + 2500 + Math.random() * 4000;
  }
  lookX += (lookTargetX - lookX) * 0.03;
  lookY += (lookTargetY - lookY) * 0.03;
}

// ─── Draw helpers ─────────────────────────────────────────────────────────────
const HEAD_RX = 102, HEAD_RY = 110;

function drawHead(oy) {
  // Outer glow
  const glow = ctx.createRadialGradient(CX, CY + oy, 70, CX, CY + oy, HEAD_RX + 18);
  glow.addColorStop(0, 'rgba(99,102,241,0)');
  glow.addColorStop(1, 'rgba(99,102,241,0.12)');
  ctx.beginPath();
  ctx.ellipse(CX, CY + oy, HEAD_RX + 18, HEAD_RY + 18, 0, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // Face fill — warm top-left light
  const face = ctx.createRadialGradient(CX - 20, CY - 30 + oy, 10, CX + 5, CY + oy, HEAD_RX);
  face.addColorStop(0,   '#263354');
  face.addColorStop(0.45, '#18233e');
  face.addColorStop(0.82, '#0f1628');
  face.addColorStop(1,    '#080c18');
  ctx.beginPath();
  ctx.ellipse(CX, CY + oy, HEAD_RX, HEAD_RY, 0, 0, Math.PI * 2);
  ctx.fillStyle = face;
  ctx.fill();

  // Rim light (subtle indigo outline)
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(CX, CY + oy, HEAD_RX, HEAD_RY, 0, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(129,140,248,0.18)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  // Forehead highlight
  const hl = ctx.createRadialGradient(CX - 30, CY - 65 + oy, 4, CX - 30, CY - 60 + oy, 72);
  hl.addColorStop(0, 'rgba(180,200,255,0.10)');
  hl.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.ellipse(CX, CY + oy, HEAD_RX, HEAD_RY, 0, 0, Math.PI * 2);
  ctx.fillStyle = hl;
  ctx.fill();
}

function drawEye(ex, ey, bs) {
  const ew = 21, eh = 15 * bs;
  if (eh < 0.4) return;

  const px = ex + lookX * 4;
  const py = ey + lookY * 2;

  ctx.save();

  // Eye socket shadow
  ctx.beginPath();
  ctx.ellipse(ex, ey, ew + 3, eh + 3, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(4,6,15,0.5)';
  ctx.fill();

  // Clip to almond shape
  ctx.beginPath();
  ctx.moveTo(ex - ew, ey);
  ctx.bezierCurveTo(ex - ew, ey - eh * 1.1, ex + ew, ey - eh * 1.1, ex + ew, ey);
  ctx.bezierCurveTo(ex + ew, ey + eh * 1.1, ex - ew, ey + eh * 1.1, ex - ew, ey);
  ctx.clip();

  // Sclera
  ctx.beginPath();
  ctx.ellipse(ex, ey, ew, eh, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#C8DAEE';
  ctx.fill();

  // Iris gradient — cyan/teal
  const ir = eh * 0.85;
  const iGrad = ctx.createRadialGradient(px - 2, py - 2, 0.5, px, py, ir);
  iGrad.addColorStop(0,   '#22D3EE');
  iGrad.addColorStop(0.38,'#0EA5E9');
  iGrad.addColorStop(0.75,'#075985');
  iGrad.addColorStop(1,   '#0C2340');
  ctx.beginPath();
  ctx.arc(px, py, ir, 0, Math.PI * 2);
  ctx.fillStyle = iGrad;
  ctx.fill();

  // Iris ring glow
  ctx.beginPath();
  ctx.arc(px, py, ir, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(34,211,238,0.45)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Pupil
  ctx.beginPath();
  ctx.arc(px, py, ir * 0.44, 0, Math.PI * 2);
  ctx.fillStyle = '#010306';
  ctx.fill();

  // Main highlight
  ctx.beginPath();
  ctx.arc(px + 5, py - 4, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.fill();

  // Secondary highlight
  ctx.beginPath();
  ctx.arc(px - 3, py + 3, 1.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.fill();

  ctx.restore();

  // Upper eyelid line
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ex - ew, ey);
  ctx.bezierCurveTo(ex - ew, ey - eh * 1.1, ex + ew, ey - eh * 1.1, ex + ew, ey);
  ctx.strokeStyle = 'rgba(5,10,25,0.75)';
  ctx.lineWidth = 1.8;
  ctx.stroke();
  ctx.restore();
}

function drawEyebrow(ex, ey) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ex - 22, ey - 30);
  ctx.bezierCurveTo(ex - 12, ey - 39, ex + 10, ey - 39, ex + 22, ey - 30);
  ctx.strokeStyle = '#7A90C0';
  ctx.lineWidth = 2.8;
  ctx.lineCap = 'round';
  ctx.shadowColor = 'rgba(120,150,200,0.3)';
  ctx.shadowBlur = 5;
  ctx.stroke();
  ctx.restore();
}

function drawNose(oy) {
  const nx = CX, ny = CY + 26 + oy;
  ctx.save();
  ctx.strokeStyle = 'rgba(80,110,170,0.32)';
  ctx.lineWidth = 1.4;
  ctx.lineCap = 'round';

  ctx.beginPath();
  ctx.moveTo(nx - 2, ny - 10);
  ctx.quadraticCurveTo(nx - 8, ny + 4, nx - 9, ny + 12);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(nx + 2, ny - 10);
  ctx.quadraticCurveTo(nx + 8, ny + 4, nx + 9, ny + 12);
  ctx.stroke();

  // Nostril hints
  ctx.beginPath();
  ctx.arc(nx - 9, ny + 14, 2.5, 0, Math.PI * 2);
  ctx.arc(nx + 9, ny + 14, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(40,60,110,0.4)';
  ctx.fill();

  ctx.restore();
}

function drawMouth(oy, open, wide) {
  const mx = CX, my = CY + 60 + oy;
  const hw = 34 * wide;         // half-width
  const oh = 28 * open;         // open height

  ctx.save();

  if (oh < 1) {
    // Closed — gentle smile
    ctx.beginPath();
    ctx.moveTo(mx - hw, my);
    ctx.bezierCurveTo(mx - hw * 0.55, my - 2, mx - hw * 0.25, my + 6, mx, my + 7);
    ctx.bezierCurveTo(mx + hw * 0.25, my + 6, mx + hw * 0.55, my - 2, mx + hw, my);
    ctx.strokeStyle = 'rgba(120,155,215,0.55)';
    ctx.lineWidth = 2.2;
    ctx.lineCap = 'round';
    ctx.stroke();
  } else {
    const topY = my - oh * 0.38;
    const botY = my + oh * 0.62;

    // Interior
    ctx.beginPath();
    ctx.moveTo(mx - hw, my);
    ctx.bezierCurveTo(mx - hw * 0.3, topY, mx + hw * 0.3, topY, mx + hw, my);
    ctx.bezierCurveTo(mx + hw * 0.5, botY, mx - hw * 0.5, botY, mx - hw, my);
    ctx.closePath();
    const int = ctx.createLinearGradient(mx, topY, mx, botY);
    int.addColorStop(0, '#040608');
    int.addColorStop(0.5, '#080d18');
    int.addColorStop(1, '#040608');
    ctx.fillStyle = int;
    ctx.fill();

    // Upper lip
    ctx.beginPath();
    ctx.moveTo(mx - hw, my);
    ctx.bezierCurveTo(mx - hw * 0.75, topY - 5, mx - hw * 0.28, topY - 7, mx, topY - 5);
    ctx.bezierCurveTo(mx + hw * 0.28, topY - 7, mx + hw * 0.75, topY - 5, mx + hw, my);
    ctx.bezierCurveTo(mx + hw * 0.3, topY, mx - hw * 0.3, topY, mx - hw, my);
    ctx.closePath();
    const ulG = ctx.createLinearGradient(mx, topY - 7, mx, my);
    ulG.addColorStop(0, '#8A9FCC');
    ulG.addColorStop(1, '#4E6490');
    ctx.fillStyle = ulG;
    ctx.fill();

    // Lower lip
    ctx.beginPath();
    ctx.moveTo(mx - hw, my);
    ctx.bezierCurveTo(mx - hw * 0.5, botY + 5, mx + hw * 0.5, botY + 5, mx + hw, my);
    ctx.bezierCurveTo(mx + hw * 0.3, botY, mx - hw * 0.3, botY, mx - hw, my);
    ctx.closePath();
    const llG = ctx.createLinearGradient(mx, my, mx, botY + 5);
    llG.addColorStop(0, '#6278B0');
    llG.addColorStop(1, '#3A4E7A');
    ctx.fillStyle = llG;
    ctx.fill();

    // Lower lip sheen
    ctx.beginPath();
    ctx.ellipse(mx, botY - 2, hw * 0.28, oh * 0.09, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180,210,255,0.18)';
    ctx.fill();

    // Outline
    ctx.beginPath();
    ctx.moveTo(mx - hw, my);
    ctx.bezierCurveTo(mx - hw * 0.75, topY - 5, mx - hw * 0.28, topY - 7, mx, topY - 5);
    ctx.bezierCurveTo(mx + hw * 0.28, topY - 7, mx + hw * 0.75, topY - 5, mx + hw, my);
    ctx.bezierCurveTo(mx + hw * 0.5, botY + 5, mx - hw * 0.5, botY + 5, mx - hw, my);
    ctx.strokeStyle = 'rgba(80,110,180,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  ctx.restore();
}

// ─── Render loop ──────────────────────────────────────────────────────────────
const EL = { x: CX - 36, y: CY - 22 };
const ER = { x: CX + 36, y: CY - 22 };

function frame(now) {
  ctx.clearRect(0, 0, W, H);

  // Update state
  breathPhase += 0.018;
  const oy = breathY();
  mouth.open += (mouth.tOpen - mouth.open) * 0.22;
  mouth.wide += (mouth.tWide - mouth.wide) * 0.22;
  tickBlink(now);
  tickLook(now);
  const bs = blinkScale();

  drawHead(oy);
  drawEyebrow(EL.x, EL.y + oy);
  drawEyebrow(ER.x, ER.y + oy);
  drawEye(EL.x, EL.y + oy, bs);
  drawEye(ER.x, ER.y + oy, bs);
  drawNose(oy);
  drawMouth(oy, mouth.open, mouth.wide);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ─── Status logic ─────────────────────────────────────────────────────────────
const COLORS = {
  listening:  { hex: 'var(--listening)',  bg: 'rgba(52,211,153,0.08)',  border: 'rgba(52,211,153,0.2)',  label: 'Listening'   },
  processing: { hex: 'var(--processing)', bg: 'rgba(251,191,36,0.08)',  border: 'rgba(251,191,36,0.2)',  label: 'Processing'  },
  speaking:   { hex: 'var(--speaking)',   bg: 'rgba(96,165,250,0.08)',  border: 'rgba(96,165,250,0.2)',  label: 'Speaking'    },
  idle:       { hex: 'var(--muted)',      bg: 'rgba(90,100,128,0.06)',  border: 'rgba(90,100,128,0.15)', label: 'Idle'        },
};

const pill    = document.getElementById('status-pill');
const pillTxt = document.getElementById('status-text');
const waveBars= document.getElementById('wave-bars');
const rBase   = document.querySelector('.r-base');
const rDash   = document.querySelector('.r-dash');
const rPulse  = document.querySelector('.r-pulse');

function setStatus(val) {
  const s = COLORS[val] || COLORS.idle;
  pill.style.color       = s.hex;
  pill.style.background  = s.bg;
  pill.style.borderColor = s.border;
  pillTxt.textContent    = s.label;
  pill.className         = val;

  rBase.style.stroke  = s.hex;
  rDash.style.stroke  = s.hex;
  rPulse.style.stroke = s.hex;

  waveBars.classList.toggle('visible', val === 'speaking');
}

setStatus('listening');

// ─── Chat ─────────────────────────────────────────────────────────────────────
const msgBox = document.getElementById('messages');
let hasMessages = false;

function addMessage(role, text) {
  if (!hasMessages) { msgBox.innerHTML = ''; hasMessages = true; }

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const av = document.createElement('div');
  av.className = `msg-av ${role === 'user' ? 'user-av' : 'ai-av'}`;
  av.textContent = role === 'user' ? 'You' : 'AI';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = text;

  row.appendChild(av);
  row.appendChild(bub);
  msgBox.appendChild(row);

  while (msgBox.children.length > 60) msgBox.removeChild(msgBox.firstChild);
  msgBox.scrollTop = msgBox.scrollHeight;
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
const connBadge = document.getElementById('conn-badge');
const connLabel = document.getElementById('conn-label');
// ─── Latency metrics ──────────────────────────────────────────────────────────
const metricBox = document.getElementById('metrics');
const STAGES = ['stt', 'rag', 'llm', 'tts'];
const latencies = {};

function resetMetrics() {
  STAGES.forEach(s => {
    latencies[s] = null;
    document.getElementById(`ms-${s}`).classList.remove('cached');
    document.getElementById(`mv-${s}`).textContent = '…';
  });
  document.getElementById('mv-total').textContent = '…';
}

function updateMetric(stage, ms, cached) {
  latencies[stage] = ms;
  const box = document.getElementById(`ms-${stage}`);
  const val = document.getElementById(`mv-${stage}`);
  if (!box || !val) return;
  box.classList.toggle('cached', !!cached);
  val.textContent = cached ? '⚡ cached' : `${ms} ms`;
  const known = STAGES.map(s => latencies[s]).filter(v => v != null);
  if (known.length > 0)
    document.getElementById('mv-total').textContent =
      `${Math.round(known.reduce((a, b) => a + b, 0))} ms`;
  metricBox.classList.add('show');
}

let ws = null, reconnTimer = null;

function connect() {
  if (ws && ws.readyState <= 1) return;
  ws = new WebSocket('ws://localhost:8765');

  ws.onopen = () => {
    connBadge.className = 'conn-badge connected';
    connLabel.textContent = 'Connected';
    clearTimeout(reconnTimer);
  };

  ws.onmessage = ({ data }) => {
    let m; try { m = JSON.parse(data); } catch { return; }
    if      (m.type === 'viseme')     setViseme(m.viseme, m.amplitude);
    else if (m.type === 'status')     { setStatus(m.value); if (m.value === 'processing') resetMetrics(); }
    else if (m.type === 'transcript') addMessage(m.role, m.text);
    else if (m.type === 'latency')    updateMetric(m.stage, m.ms, m.cached);
  };

  ws.onerror = () => {
    connBadge.className = 'conn-badge error';
    connLabel.textContent = 'Error';
  };

  ws.onclose = () => {
    connBadge.className = 'conn-badge';
    connLabel.textContent = 'Reconnecting…';
    setStatus('idle');
    reconnTimer = setTimeout(connect, 2000);
  };
}

connect();
</script>
