<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveTec InfoPoint</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07080F; --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.07);
      --text: #E8EEFF; --muted: #5A6480; --accent: #818CF8;
      --listening: #34D399; --processing: #FBBF24; --speaking: #60A5FA;
    }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: system-ui,-apple-system,'Segoe UI',sans-serif; display: flex; flex-direction: column; height: 100vh; }

    header { flex-shrink:0; width:100%; display:flex; align-items:center; justify-content:space-between; padding:14px 28px; border-bottom:1px solid var(--border); background:rgba(7,8,15,0.9); backdrop-filter:blur(12px); z-index:20; }
    .brand { display:flex; align-items:center; gap:12px; }
    .brand-icon { width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,#4f46e5,#818CF8); display:flex; align-items:center; justify-content:center; box-shadow:0 0 16px rgba(129,140,248,0.35); }
    .brand-icon svg { width:18px; height:18px; fill:#fff; }
    .brand-name { font-size:1rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text); }
    .brand-sub  { font-size:.68rem; letter-spacing:.04em; color:var(--muted); margin-top:1px; }
    .conn-badge { display:flex; align-items:center; gap:6px; padding:5px 12px; border-radius:20px; background:var(--surface); border:1px solid var(--border); font-size:.72rem; color:var(--muted); transition:all .3s; }
    .conn-badge.connected { color:var(--listening); border-color:rgba(52,211,153,.25); }
    .conn-badge.error     { color:#EF4444; border-color:rgba(239,68,68,.25); }
    #conn-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }
    .conn-badge.connected #conn-dot { animation:dot-pulse 2s ease-in-out infinite; }
    @keyframes dot-pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    #avatar-container { flex-shrink:0; width:100%; height:36vh; background:#07090f; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }

    /* Lottie avatar */
    #avatar-lottie-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #lottie-avatar {
      width: 36vh;
      height: 36vh;
    }


    /* Speaking glow */
    #avatar-lottie-wrap.speaking #lottie-avatar {
      animation: lottie-pulse 0.9s ease-in-out infinite alternate;
    }
    @keyframes lottie-pulse {
      from { filter: drop-shadow(0 0 10px rgba(96,165,250,.3)); }
      to   { filter: drop-shadow(0 0 24px rgba(96,165,250,.65)); }
    }

    /* Gradient fade at bottom */
    #avatar-container::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(to bottom, transparent, #07080f);
      pointer-events: none;
      z-index: 3;
    }

    /* Bottom panel fills all remaining space */
    #bottom-panel { flex:1; min-height:0; display:flex; flex-direction:column; align-items:center; padding:14px 24px 20px; gap:12px; background:var(--bg); background-image:radial-gradient(ellipse 70% 60% at 50% 100%,rgba(30,27,75,.3),transparent); overflow-y:auto; }
    #bottom-panel::-webkit-scrollbar { width:4px; }
    #bottom-panel::-webkit-scrollbar-thumb { background:rgba(255,255,255,.08); border-radius:2px; }
    .status-row { flex-shrink:0; display:flex; align-items:center; gap:12px; height:36px; }
    #status-pill { display:flex; align-items:center; gap:8px; padding:6px 16px; border-radius:20px; background:rgba(52,211,153,.08); border:1px solid rgba(52,211,153,.2); font-size:.82rem; font-weight:500; letter-spacing:.04em; color:var(--listening); transition:all .4s; }
    .pill-dot { width:7px; height:7px; border-radius:50%; background:currentColor; flex-shrink:0; }
    #status-pill.listening .pill-dot { animation:dot-pulse 1.4s ease-in-out infinite; }
    #wave-bars { display:flex; align-items:center; gap:3px; opacity:0; transition:opacity .3s; }
    #wave-bars.visible { opacity:1; }
    #wave-bars span { display:block; width:3px; border-radius:2px; background:var(--speaking); animation:bar .85s ease-in-out infinite; }
    #wave-bars span:nth-child(1){height:8px;animation-delay:.00s} #wave-bars span:nth-child(2){height:16px;animation-delay:.12s}
    #wave-bars span:nth-child(3){height:24px;animation-delay:.24s} #wave-bars span:nth-child(4){height:30px;animation-delay:.12s}
    #wave-bars span:nth-child(5){height:24px;animation-delay:.36s} #wave-bars span:nth-child(6){height:16px;animation-delay:.18s}
    #wave-bars span:nth-child(7){height:8px;animation-delay:.06s}
    @keyframes bar { 0%,100%{transform:scaleY(.25);opacity:.5} 50%{transform:scaleY(1);opacity:1} }
    #metrics { flex-shrink:0; display:flex; align-items:center; gap:8px; opacity:0; transition:opacity .5s; flex-wrap:wrap; justify-content:center; }
    #metrics.show { opacity:1; }
    .m-stage { display:flex; flex-direction:column; align-items:center; gap:2px; min-width:52px; }
    .m-label { font-size:.58rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
    .m-val   { font-size:.78rem; font-weight:600; color:var(--text); transition:color .3s; }
    .m-stage.cached .m-val { color:var(--listening); } .m-stage.total .m-val { color:var(--accent); }
    .m-div { width:1px; height:24px; background:var(--border); flex-shrink:0; }
    /* Chat wrap grows to fill remaining space */
    #chat-wrap { flex:1; min-height:0; width:100%; max-width:820px; border-radius:20px; overflow:hidden; background:var(--surface); border:1px solid var(--border); display:flex; flex-direction:column; }
    .chat-header { flex-shrink:0; padding:13px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; font-size:.72rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
    .chat-header-dot { width:5px; height:5px; border-radius:50%; background:var(--accent); }
    #messages { flex:1; min-height:0; padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; }
    #messages::-webkit-scrollbar { width:4px; }
    #messages::-webkit-scrollbar-thumb { background:rgba(255,255,255,.08); border-radius:2px; }
    .empty-msg { color:var(--muted); font-size:.82rem; text-align:center; padding:16px 0; opacity:.7; }
    .msg-row { display:flex; align-items:flex-end; gap:10px; animation:slide-in .22s ease; }
    .msg-row.user { flex-direction:row-reverse; }
    @keyframes slide-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg-av { width:26px; height:26px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:.65rem; font-weight:700; }
    .msg-av.user-av { background:rgba(96,165,250,.15); color:var(--speaking); border:1px solid rgba(96,165,250,.2); }
    .msg-av.ai-av   { background:rgba(129,140,248,.12); color:var(--accent);   border:1px solid rgba(129,140,248,.2); }
    .bubble { max-width:72%; padding:9px 14px; font-size:.875rem; line-height:1.55; border-radius:16px; }
    .msg-row.user      .bubble { background:rgba(96,165,250,.12); border:1px solid rgba(96,165,250,.18); border-bottom-right-radius:4px; color:#C5DEFF; }
    .msg-row.assistant .bubble { background:rgba(129,140,248,.07); border:1px solid rgba(129,140,248,.15); border-bottom-left-radius:4px; color:#D4D8F8; }
  </style>
</head>

const lottieWrap = document.getElementById('avatar-lottie-wrap');
const lottieAnim = lottie.loadAnimation({
  container: document.getElementById('lottie-avatar'),
  renderer:  'svg',
  loop:      false,
  autoplay:  false,
  animationData: _LOTTIE_DATA,
});
// Start frozen at frame 0 — neutral pose, no waving, no hello text
lottieAnim.goToAndStop(0, true);

// Oscillate frames 0↔10 to drive mouth open/close when speaking.
// At frame 0: mouth closed (rotation 0°).
// At frame 10: mouth open (rotation 5°). Hello-text layer is scale=0 there so invisible.
let _lipInterval = null;
let _lipFrame = 0, _lipDir = 1;

function setAvatarState(speaking) {
  lottieWrap.classList.toggle('speaking', speaking);
  if (_lipInterval) { clearInterval(_lipInterval); _lipInterval = null; }
  if (speaking) {
    _lipFrame = 0; _lipDir = 1;
    _lipInterval = setInterval(() => {
      _lipFrame += _lipDir;
      if (_lipFrame >= 10) _lipDir = -1;
      if (_lipFrame <= 0)  _lipDir =  1;
      lottieAnim.goToAndStop(_lipFrame, true);
    }, 55); // ~9 open-close cycles per second — natural talking rhythm
  } else {
    lottieAnim.goToAndStop(0, true);
  }
}

function setViseme(v, a) { /* reserved */ }

// ─── Status ────────────────────────────────────────────────────────────────────
const COLORS = {
  listening:  {hex:'var(--listening)',  bg:'rgba(52,211,153,.08)',  border:'rgba(52,211,153,.2)',  label:'Listening'},
  processing: {hex:'var(--processing)', bg:'rgba(251,191,36,.08)',  border:'rgba(251,191,36,.2)',  label:'Processing'},
  speaking:   {hex:'var(--speaking)',   bg:'rgba(96,165,250,.08)',  border:'rgba(96,165,250,.2)',  label:'Speaking'},
  idle:       {hex:'var(--muted)',      bg:'rgba(90,100,128,.06)', border:'rgba(90,100,128,.15)', label:'Idle'},
};
const pill = document.getElementById('status-pill');
const pillTxt = document.getElementById('status-text');
const waveBars = document.getElementById('wave-bars');
function setStatus(val) {
  const s = COLORS[val] || COLORS.idle;
  pill.style.color = s.hex; pill.style.background = s.bg; pill.style.borderColor = s.border;
  pillTxt.textContent = s.label; pill.className = val;
  waveBars.classList.toggle('visible', val === 'speaking');
  setAvatarState(val === 'speaking');
}
setStatus('listening');

function setViseme(v, a) { targetAmp = isNaN(a) ? 0 : Math.min(1, Math.max(0, a)); }

// ─── Chat ──────────────────────────────────────────────────────────────────────
const msgBox = document.getElementById('messages');
let hasMsg = false;
function addMessage(role, text) {
  if (!hasMsg) { msgBox.innerHTML = ''; hasMsg = true; }
  const row = document.createElement('div'); row.className = `msg-row ${role}`;
  const av  = document.createElement('div'); av.className = `msg-av ${role==='user'?'user-av':'ai-av'}`; av.textContent = role==='user'?'You':'AI';
  const bub = document.createElement('div'); bub.className = 'bubble'; bub.textContent = text;
  row.appendChild(av); row.appendChild(bub); msgBox.appendChild(row);
  while (msgBox.children.length > 60) msgBox.removeChild(msgBox.firstChild);
  msgBox.scrollTop = msgBox.scrollHeight;
}

// ─── Metrics ───────────────────────────────────────────────────────────────────
const metricBox = document.getElementById('metrics');
const STAGES = ['stt','rag','llm','tts'];
const latencies = {};
function resetMetrics() { STAGES.forEach(s => { latencies[s]=null; document.getElementById(`ms-${s}`).classList.remove('cached'); document.getElementById(`mv-${s}`).textContent='…'; }); document.getElementById('mv-total').textContent='…'; }
function updateMetric(stage, ms, cached) {
  latencies[stage] = ms;
  const box = document.getElementById(`ms-${stage}`), val = document.getElementById(`mv-${stage}`);
  if (!box||!val) return;
  box.classList.toggle('cached', !!cached); val.textContent = cached ? '⚡ cached' : `${ms} ms`;
  const known = STAGES.map(s=>latencies[s]).filter(v=>v!=null);
  if (known.length) document.getElementById('mv-total').textContent = `${Math.round(known.reduce((a,b)=>a+b,0))} ms`;
  metricBox.classList.add('show');
}

// ─── WebSocket ─────────────────────────────────────────────────────────────────
const connBadge = document.getElementById('conn-badge'), connLabel = document.getElementById('conn-label');
let ws = null, reconnTimer = null;
function connect() {
  if (ws && ws.readyState <= 1) return;
  ws = new WebSocket('ws://localhost:8765');
  ws.onopen  = () => { connBadge.className='conn-badge connected'; connLabel.textContent='Connected'; clearTimeout(reconnTimer); };
  ws.onmessage = ({data}) => { let m; try{m=JSON.parse(data)}catch{return}; if(m.type==='viseme') setViseme(m.viseme,m.amplitude); else if(m.type==='status'){setStatus(m.value);if(m.value==='processing')resetMetrics()} else if(m.type==='transcript') addMessage(m.role,m.text); else if(m.type==='latency') updateMetric(m.stage,m.ms,m.cached); };
  ws.onerror = () => { connBadge.className='conn-badge error'; connLabel.textContent='Error'; };
  ws.onclose = () => { connBadge.className='conn-badge'; connLabel.textContent='Reconnecting…'; setStatus('idle'); reconnTimer=setTimeout(connect,2000); };
}
connect();
</script>
