<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>WaveTec InfoPoint</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      background:hsl(230,39%,9%);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% 0%,rgba(100,120,220,0.18),transparent),
        radial-gradient(ellipse 40% 40% at 80% 100%,rgba(60,80,180,0.10),transparent);
      color:#EEF0FF;
      font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
      display:flex;flex-direction:column;align-items:center;
    }
    header{
      width:100%;display:flex;align-items:center;justify-content:space-between;
      padding:14px 28px;
      background:rgba(14,17,32,0.92);backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(255,255,255,0.07);
      position:sticky;top:0;z-index:20;
    }
    .brand{display:flex;align-items:center;gap:10px}
    .brand-icon{
      width:36px;height:36px;border-radius:10px;
      background:linear-gradient(135deg,#5060C8,#90A0F0);
      display:flex;align-items:center;justify-content:center;font-size:1.1rem;
      box-shadow:0 4px 14px rgba(100,120,240,0.4);
    }
    .brand-name{font-size:.9rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
    .brand-sub{font-size:.62rem;color:#6670A0;margin-top:1px}
    .conn{
      display:flex;align-items:center;gap:6px;padding:5px 13px;border-radius:20px;
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
      font-size:.71rem;color:#5A6080;transition:all .3s;
    }
    .conn.on {color:#4ADE80;border-color:rgba(74,222,128,.24)}
    .conn.err{color:#F87171;border-color:rgba(248,113,113,.24)}
    #cdot{width:5px;height:5px;border-radius:50%;background:currentColor}
    .conn.on #cdot{animation:dp 2s ease-in-out infinite}
    @keyframes dp{0%,100%{opacity:1}50%{opacity:.25}}
    main{
      flex:1;width:100%;max-width:860px;
      display:flex;flex-direction:column;align-items:center;
      padding:28px 20px 44px;gap:20px;
    }
    .av-area{display:flex;flex-direction:column;align-items:center;gap:14px}
    .av-frame{
      position:relative;border-radius:24px;overflow:hidden;
      background:linear-gradient(160deg,#141830 0%,#0E1220 100%);
      border:1px solid rgba(100,120,255,0.18);
      box-shadow:0 0 40px rgba(80,100,220,0.18),0 20px 60px rgba(0,0,0,0.4);
    }
    .av-frame::before{
      content:'';position:absolute;inset:-1px;border-radius:24px;
      background:linear-gradient(135deg,rgba(120,140,255,.35),rgba(80,200,255,.15),rgba(120,100,255,.35));
      -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
      mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor;mask-composite:exclude;
      padding:1px;pointer-events:none;
      animation:borderGlow 4s ease-in-out infinite;
    }
    @keyframes borderGlow{0%,100%{opacity:.6}50%{opacity:1}}
    #av{display:block}
    .stat-row{display:flex;align-items:center;gap:10px}
    #spill{
      display:flex;align-items:center;gap:7px;padding:6px 16px;border-radius:20px;
      background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.24);
      font-size:.82rem;font-weight:500;color:#4ADE80;transition:all .4s;
    }
    .sd{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
    #spill.listening .sd{animation:dp 1.5s ease-in-out infinite}
    #wbars{display:flex;align-items:center;gap:3px;opacity:0;transition:opacity .3s}
    #wbars.on{opacity:1}
    #wbars span{display:block;width:3px;border-radius:2px;background:#60A5FA;animation:wb .9s ease-in-out infinite}
    #wbars span:nth-child(1){height:6px; animation-delay:.00s}
    #wbars span:nth-child(2){height:13px;animation-delay:.12s}
    #wbars span:nth-child(3){height:22px;animation-delay:.22s}
    #wbars span:nth-child(4){height:28px;animation-delay:.10s}
    #wbars span:nth-child(5){height:22px;animation-delay:.34s}
    #wbars span:nth-child(6){height:13px;animation-delay:.16s}
    #wbars span:nth-child(7){height:6px; animation-delay:.06s}
    @keyframes wb{0%,100%{transform:scaleY(.2);opacity:.4}50%{transform:scaleY(1);opacity:1}}
    #chat{
      width:100%;max-width:580px;border-radius:20px;overflow:hidden;
      background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
    }
    .chd{
      padding:11px 18px;border-bottom:1px solid rgba(255,255,255,0.07);
      display:flex;align-items:center;gap:7px;
      font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#5A6080;
    }
    .chd-dot{width:5px;height:5px;border-radius:50%;background:#8090D0}
    #msgs{
      padding:14px;min-height:100px;max-height:250px;
      overflow-y:auto;display:flex;flex-direction:column;gap:10px;
    }
    #msgs::-webkit-scrollbar{width:3px}
    #msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:2px}
    .empty{color:#404060;font-size:.8rem;text-align:center;padding:18px 0}
    .row{display:flex;align-items:flex-end;gap:8px;animation:mi .22s ease}
    .row.user{flex-direction:row-reverse}
    @keyframes mi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .mav{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700}
    .mav.u{background:rgba(96,165,250,.12);color:#60A5FA;border:1px solid rgba(96,165,250,.2)}
    .mav.a{background:rgba(130,150,255,.1);color:#8090F0;border:1px solid rgba(130,150,255,.2)}
    .bub{max-width:74%;padding:8px 13px;border-radius:14px;font-size:.855rem;line-height:1.54}
    .row.user      .bub{background:rgba(96,165,250,.1); border:1px solid rgba(96,165,250,.18); border-bottom-right-radius:4px;color:#B8D0F8}
    .row.assistant .bub{background:rgba(130,150,255,.07);border:1px solid rgba(130,150,255,.15);border-bottom-left-radius:4px;color:#D0D6F8}
  </style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-icon">✦</div>
    <div><div class="brand-name">WaveTec</div><div class="brand-sub">InfoPoint Assistant</div></div>
  </div>
  <div class="conn" id="conn"><div id="cdot"></div><span id="clbl">Connecting…</span></div>
</header>
<main>
  <div class="av-area">
    <div class="av-frame"><canvas id="av" width="300" height="370"></canvas></div>
    <div class="stat-row">
      <div id="spill" class="listening"><div class="sd"></div><span id="stxt">Listening</span></div>
      <div id="wbars"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    </div>
  </div>
  <div id="chat">
    <div class="chd"><div class="chd-dot"></div>Conversation</div>
    <div id="msgs"><div class="empty">Say something to begin…</div></div>
  </div>
</main>
<script>
// ── Canvas ────────────────────────────────────────────────────────────────────
const cv=document.getElementById('av'), c=cv.getContext('2d');
const W=300, H=370, CX=150, CY=185;

// ── Viseme ─────────────────────────────────────────────────────────────────────
const VIS={
  sil:{o:0,w:1},PP:{o:.03,w:.96},FF:{o:.08,w:.88},TH:{o:.09,w:.88},
  DD:{o:.24,w:1},kk:{o:.20,w:1},CH:{o:.30,w:.80},SS:{o:.13,w:.88},
  nn:{o:.18,w:1},RR:{o:.34,w:.78},aa:{o:.90,w:1.06},E:{o:.52,w:1.14},
  ih:{o:.36,w:1.10},oh:{o:.64,w:.70},ou:{o:.50,w:.60},
};
const M={o:0,w:1,to:0,tw:1};
function setViseme(n,amp){
  const v=VIS[n]||VIS.sil,s=isNaN(amp)?1:Math.max(.5,.5+amp*.85);
  M.to=v.o*s; M.tw=v.w;
}

// ── Blink ──────────────────────────────────────────────────────────────────────
let blT=0,blOn=false,blNext=0;
function sched(){blNext=performance.now()+2800+Math.random()*4000}
sched();
function tickBlink(t){
  if(!blOn&&t>=blNext){blOn=true;blT=0}
  if(blOn){blT+=.13;if(blT>=1){blOn=false;blT=0;sched()}}
}
const blS=()=>blOn?1-Math.sin(blT*Math.PI):1;

// ── Idle ────────────────────────────────────────────────────────────────────────
let bp=0, sp=0;
const getOY=()=>Math.sin(bp)*2.2;
const getTilt=()=>Math.sin(sp)*.008;

// ── Eye wander ─────────────────────────────────────────────────────────────────
let ex=0,ey=0,etx=0,ety=0,et=0;
function tickEye(t){
  if(t>et){etx=(Math.random()-.5)*.45;ety=(Math.random()-.5)*.25;et=t+3200+Math.random()*4800}
  ex+=(etx-ex)*.022; ey+=(ety-ey)*.022;
}

// ── Palette ────────────────────────────────────────────────────────────────────
// Skin — warm medium tone (works for a friendly professional look)
const S0='#F5C98C', S1='#E8B470', S2='#C8904A', S3='#A87030';
// Hair — dark brown, clean cut
const H0='#1E1208', H1='#140C04';
// Eyes — dark warm brown
const E0='#5C3A18', E1='#3A2008', E2='#1A0C02';
// Outfit — dark navy shirt
const OT='#1E2E50', OT2='#182440', COL='#E8EEF8';

// ── Scene background gradient ──────────────────────────────────────────────────
function drawBg(){
  const g=c.createLinearGradient(0,H*.55,0,H);
  g.addColorStop(0,'rgba(30,46,80,0)');
  g.addColorStop(1,'rgba(30,46,80,0.55)');
  c.fillStyle=g; c.fillRect(0,H*.55,W,H*.45);
}

// ── Outfit ─────────────────────────────────────────────────────────────────────
function drawOutfit(cy){
  // Shirt body
  const sg=c.createLinearGradient(0,cy+135,0,H);
  sg.addColorStop(0,OT2); sg.addColorStop(1,OT);
  c.beginPath();
  c.moveTo(0,H);
  c.lineTo(0,cy+160);
  c.bezierCurveTo(30,cy+140,80,cy+132,CX-26,cy+128);
  c.lineTo(CX+26,cy+128);
  c.bezierCurveTo(W-80,cy+132,W-30,cy+140,W,cy+160);
  c.lineTo(W,H);
  c.closePath();
  c.fillStyle=sg; c.fill();

  // White collar / shirt fold
  c.beginPath();
  c.moveTo(CX-26,cy+128);
  c.lineTo(CX-10,cy+155);
  c.lineTo(CX,cy+162);
  c.lineTo(CX+10,cy+155);
  c.lineTo(CX+26,cy+128);
  c.lineTo(CX+14,cy+128);
  c.lineTo(CX+4,cy+152);
  c.lineTo(CX,cy+156);
  c.lineTo(CX-4,cy+152);
  c.lineTo(CX-14,cy+128);
  c.closePath();
  c.fillStyle=COL; c.fill();
}

// ── Neck ────────────────────────────────────────────────────────────────────────
function drawNeck(cy){
  const ng=c.createLinearGradient(CX-18,0,CX+18,0);
  ng.addColorStop(0,S2); ng.addColorStop(.3,S0); ng.addColorStop(.7,S0); ng.addColorStop(1,S2);
  c.beginPath();
  c.moveTo(CX-20,cy+108);
  c.bezierCurveTo(CX-22,cy+140,CX-14,cy+128,CX-14,cy+130);
  c.lineTo(CX+14,cy+130);
  c.bezierCurveTo(CX+14,cy+128,CX+22,cy+140,CX+20,cy+108);
  c.fillStyle=ng; c.fill();
  // Neck shadow sides
  c.fillStyle='rgba(140,90,30,0.18)';
  c.beginPath(); c.ellipse(CX-16,cy+122,6,12,0,0,Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(CX+16,cy+122,6,12,0,0,Math.PI*2); c.fill();
}

// ── Hair ────────────────────────────────────────────────────────────────────────
function drawHairBack(cy){
  const hg=c.createRadialGradient(CX-10,cy-80,10,CX,cy,105);
  hg.addColorStop(0,H0); hg.addColorStop(1,H1);
  // Full hair volume behind face
  c.beginPath();
  c.moveTo(CX-92,cy-30);
  c.bezierCurveTo(CX-98,cy-90,CX-65,cy-120,CX,cy-122);
  c.bezierCurveTo(CX+65,cy-120,CX+98,cy-90,CX+92,cy-30);
  c.bezierCurveTo(CX+95,cy+20,CX+88,cy+80,CX+65,cy+110);
  c.bezierCurveTo(CX+45,cy+130,CX+25,cy+135,CX,cy+135);
  c.bezierCurveTo(CX-25,cy+135,CX-45,cy+130,CX-65,cy+110);
  c.bezierCurveTo(CX-88,cy+80,CX-95,cy+20,CX-92,cy-30);
  c.fillStyle=hg; c.fill();
}

function drawHairTop(cy){
  const hg=c.createLinearGradient(CX-90,cy-122,CX+30,cy-40);
  hg.addColorStop(0,H0); hg.addColorStop(.6,H1);
  // Short, neat male hair cap — slightly textured top
  c.beginPath();
  c.moveTo(CX-90,cy-20);
  c.bezierCurveTo(CX-96,cy-80,CX-64,cy-120,CX,cy-122);
  c.bezierCurveTo(CX+64,cy-120,CX+96,cy-80,CX+90,cy-20);
  c.bezierCurveTo(CX+75,cy-55,CX+40,cy-72,CX+8,cy-70);
  c.bezierCurveTo(CX-8,cy-70,CX-30,cy-62,CX-50,cy-45);
  c.bezierCurveTo(CX-72,cy-28,CX-90,cy-20,CX-90,cy-20);
  c.fillStyle=hg; c.fill();

  // Side part line — slight highlight
  c.save();
  c.globalAlpha=0.22;
  c.beginPath();
  c.moveTo(CX-12,cy-122); c.bezierCurveTo(CX-18,cy-100,CX-28,cy-80,CX-50,cy-45);
  c.strokeStyle='rgba(255,255,255,0.7)'; c.lineWidth=2.5; c.lineCap='round'; c.stroke();
  c.restore();

  // Hair shine
  c.save();
  c.globalAlpha=0.18;
  c.beginPath();
  c.moveTo(CX+20,cy-118); c.bezierCurveTo(CX+45,cy-98,CX+60,cy-70,CX+55,cy-45);
  c.strokeStyle='rgba(255,255,255,0.9)'; c.lineWidth=7; c.lineCap='round'; c.stroke();
  c.restore();
}

// ── Face ────────────────────────────────────────────────────────────────────────
function drawFace(cy){
  // Drop shadow
  c.save();
  c.shadowColor='rgba(0,0,0,0.35)'; c.shadowBlur=20; c.shadowOffsetY=8;
  const fg=c.createRadialGradient(CX-16,cy-35,8,CX+8,cy,100);
  fg.addColorStop(0,S0); fg.addColorStop(.5,S1); fg.addColorStop(.88,S2); fg.addColorStop(1,S3);
  // Slightly squared-off male jaw
  c.beginPath();
  c.moveTo(CX-90,cy-35);
  c.bezierCurveTo(CX-95,cy+30,CX-88,cy+88,CX-62,cy+115);
  c.bezierCurveTo(CX-44,cy+130,CX-22,cy+136,CX,cy+136);
  c.bezierCurveTo(CX+22,cy+136,CX+44,cy+130,CX+62,cy+115);
  c.bezierCurveTo(CX+88,cy+88,CX+95,cy+30,CX+90,cy-35);
  c.bezierCurveTo(CX+85,cy-95,CX+52,cy-118,CX,cy-118);
  c.bezierCurveTo(CX-52,cy-118,CX-85,cy-95,CX-90,cy-35);
  c.fillStyle=fg; c.fill();
  c.restore();

  // Jaw highlight / chin plane
  c.save();
  c.globalAlpha=0.12;
  const jg=c.createRadialGradient(CX,cy+110,4,CX,cy+100,45);
  jg.addColorStop(0,'#FFF4E0'); jg.addColorStop(1,'transparent');
  c.beginPath();
  c.ellipse(CX,cy+110,40,22,0,0,Math.PI*2);
  c.fillStyle=jg; c.fill();
  c.restore();

  // Subtle jaw shadow for definition
  c.save();
  c.globalAlpha=0.13;
  c.beginPath();
  c.moveTo(CX-62,cy+115);
  c.bezierCurveTo(CX-44,cy+130,CX-22,cy+136,CX,cy+136);
  c.bezierCurveTo(CX+22,cy+136,CX+44,cy+130,CX+62,cy+115);
  c.strokeStyle=S3; c.lineWidth=8; c.lineCap='round'; c.stroke();
  c.restore();
}

// ── Ears ────────────────────────────────────────────────────────────────────────
function drawEars(cy){
  for(const [ex2,flip] of [[CX-90,1],[CX+90,-1]]){
    const eg=c.createRadialGradient(ex2+flip*4,cy+15,2,ex2+flip*4,cy+15,14);
    eg.addColorStop(0,S1); eg.addColorStop(1,S2);
    c.beginPath();
    c.ellipse(ex2,cy+18,10,14,flip*.15,0,Math.PI*2);
    c.fillStyle=eg; c.fill();
    // Inner ear
    c.beginPath();
    c.ellipse(ex2+flip*2,cy+18,5,8,flip*.15,0,Math.PI*2);
    c.fillStyle='rgba(160,100,50,0.25)'; c.fill();
  }
}

// ── Eyes ────────────────────────────────────────────────────────────────────────
function drawEye(ox,oy2,bsc,flip){
  const EW=28, EH=18*bsc;
  if(EH<0.25) return;
  const px=ox+ex*(flip?-1:1)*4, py=oy2+ey*2;

  c.save();
  // Socket shadow
  c.beginPath(); c.ellipse(ox,oy2+2,EW+4,EH+5,0,0,Math.PI*2);
  c.fillStyle='rgba(140,90,30,0.2)'; c.fill();

  // Clip to eye shape
  c.beginPath();
  c.moveTo(ox-EW,oy2);
  c.bezierCurveTo(ox-EW,oy2-EH*1.15,ox+EW,oy2-EH*1.15,ox+EW,oy2);
  c.bezierCurveTo(ox+EW,oy2+EH*1.15,ox-EW,oy2+EH*1.15,ox-EW,oy2);
  c.clip();

  // White
  c.beginPath(); c.ellipse(ox,oy2,EW,EH,0,0,Math.PI*2);
  c.fillStyle='#FCFAF8'; c.fill();

  // Iris — warm dark brown
  const ir=EH*.9;
  const ig=c.createRadialGradient(px-1,py-1,.5,px,py,ir);
  ig.addColorStop(0,E0); ig.addColorStop(.55,E1); ig.addColorStop(1,E2);
  c.beginPath(); c.arc(px,py,ir,0,Math.PI*2); c.fillStyle=ig; c.fill();

  // Limbal ring
  c.beginPath(); c.arc(px,py,ir,0,Math.PI*2);
  c.strokeStyle='rgba(10,4,0,0.65)'; c.lineWidth=1.4; c.stroke();

  // Pupil
  c.beginPath(); c.arc(px,py,ir*.4,0,Math.PI*2); c.fillStyle='#080200'; c.fill();

  // Catchlight
  c.beginPath(); c.arc(px+(flip?-1:1)*4,py-3.5,4,0,Math.PI*2);
  c.fillStyle='rgba(255,255,255,0.92)'; c.fill();
  c.beginPath(); c.arc(px-(flip?-1:1)*3,py+3,1.8,0,Math.PI*2);
  c.fillStyle='rgba(255,255,255,0.38)'; c.fill();

  c.restore();

  // Lash line — thicker for top, thinner below
  c.save();
  c.lineWidth=3.2; c.strokeStyle='rgba(16,8,2,0.82)'; c.lineCap='round';
  c.beginPath();
  c.moveTo(ox-EW,oy2); c.bezierCurveTo(ox-EW,oy2-EH*1.2,ox+EW,oy2-EH*1.2,ox+EW,oy2);
  c.stroke();
  // Lower
  c.lineWidth=1.3; c.strokeStyle='rgba(16,8,2,0.38)';
  c.beginPath();
  c.moveTo(ox-EW,oy2); c.bezierCurveTo(ox-EW,oy2+EH*1.2,ox+EW,oy2+EH*1.2,ox+EW,oy2);
  c.stroke();
  c.restore();
}

// ── Eyebrows ────────────────────────────────────────────────────────────────────
function drawEyebrow(ox,oy2){
  // Thicker, flatter brow — masculine
  c.save();
  // Shadow pass
  c.beginPath();
  c.moveTo(ox-30,oy2+2); c.bezierCurveTo(ox-14,oy2-7,ox+12,oy2-6,ox+28,oy2+2);
  c.strokeStyle='rgba(20,10,2,0.35)'; c.lineWidth=7; c.lineCap='round'; c.stroke();
  // Main
  c.beginPath();
  c.moveTo(ox-30,oy2); c.bezierCurveTo(ox-14,oy2-9,ox+12,oy2-8,ox+28,oy2);
  c.strokeStyle=H1; c.lineWidth=5.5; c.lineCap='round'; c.stroke();
  // Highlight top edge
  c.beginPath();
  c.moveTo(ox-24,oy2-3); c.bezierCurveTo(ox-8,oy2-10,ox+10,oy2-9,ox+22,oy2-3);
  c.strokeStyle='rgba(80,50,20,0.5)'; c.lineWidth=2; c.stroke();
  c.restore();
}

// ── Nose ─────────────────────────────────────────────────────────────────────────
function drawNose(cy){
  // Bridge shadow — subtle masculine nose
  c.save();
  c.strokeStyle='rgba(160,100,50,0.28)'; c.lineWidth=1.8; c.lineCap='round';
  c.beginPath(); c.moveTo(CX-2,cy-30); c.bezierCurveTo(CX-6,cy-10,CX-8,cy+8,CX-6,cy+18); c.stroke();
  c.beginPath(); c.moveTo(CX+2,cy-30); c.bezierCurveTo(CX+6,cy-10,CX+8,cy+8,CX+6,cy+18); c.stroke();
  // Nose tip / nostrils
  c.fillStyle='rgba(150,90,40,0.30)';
  c.beginPath(); c.ellipse(CX-9,cy+20,5.5,4,-.3,0,Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(CX+9,cy+20,5.5,4,.3,0,Math.PI*2); c.fill();
  // Tip highlight
  c.beginPath(); c.arc(CX,cy+15,3.5,0,Math.PI*2);
  c.fillStyle='rgba(255,220,170,0.22)'; c.fill();
  c.restore();
}

// ── Mouth ────────────────────────────────────────────────────────────────────────
function drawMouth(cy, open, wide){
  const mx=CX, my=cy+65;
  const hw=22*wide, oh=20*open;
  c.save();

  if(oh<1.2){
    // Relaxed friendly line — slight upward curve at corners
    c.beginPath();
    c.moveTo(mx-hw,my+1);
    c.bezierCurveTo(mx-hw*.5,my+1,mx-hw*.1,my+8,mx,my+8);
    c.bezierCurveTo(mx+hw*.1,my+8,mx+hw*.5,my+1,mx+hw,my+1);
    // Upper lip line above
    c.strokeStyle='rgba(160,90,50,0.55)'; c.lineWidth=2.6; c.lineCap='round'; c.stroke();
    // Corner dimples
    c.fillStyle='rgba(160,90,50,0.3)';
    c.beginPath(); c.arc(mx-hw,my+1,2,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(mx+hw,my+1,2,0,Math.PI*2); c.fill();
  } else {
    const tY=my-oh*.35, bY=my+oh*.65;
    // Interior
    c.beginPath();
    c.moveTo(mx-hw,my); c.bezierCurveTo(mx-hw*.22,tY,mx+hw*.22,tY,mx+hw,my);
    c.bezierCurveTo(mx+hw*.5,bY,mx-hw*.5,bY,mx-hw,my); c.closePath();
    const ig=c.createLinearGradient(mx,tY,mx,bY);
    ig.addColorStop(0,'#1C0804'); ig.addColorStop(1,'#0E0402');
    c.fillStyle=ig; c.fill();
    // Teeth
    if(oh>4){
      c.beginPath(); c.ellipse(mx,tY+oh*.25,hw*.52,oh*.2,0,0,Math.PI*2);
      c.fillStyle='rgba(252,244,238,0.72)'; c.fill();
    }
    // Upper lip
    c.beginPath();
    c.moveTo(mx-hw,my); c.bezierCurveTo(mx-hw*.68,tY-4,mx-hw*.18,tY-6,mx,tY-4);
    c.bezierCurveTo(mx+hw*.18,tY-6,mx+hw*.68,tY-4,mx+hw,my);
    c.bezierCurveTo(mx+hw*.22,tY,mx-hw*.22,tY,mx-hw,my); c.closePath();
    const ug=c.createLinearGradient(mx,tY-6,mx,my);
    ug.addColorStop(0,'#C07858'); ug.addColorStop(1,'#A05840');
    c.fillStyle=ug; c.fill();
    // Lower lip
    c.beginPath();
    c.moveTo(mx-hw,my); c.bezierCurveTo(mx-hw*.5,bY+4,mx+hw*.5,bY+4,mx+hw,my);
    c.bezierCurveTo(mx+hw*.22,bY,mx-hw*.22,bY,mx-hw,my); c.closePath();
    const lg=c.createLinearGradient(mx,my,mx,bY+4);
    lg.addColorStop(0,'#B06848'); lg.addColorStop(1,'#884A30');
    c.fillStyle=lg; c.fill();
    // Sheen
    c.beginPath(); c.ellipse(mx,bY,hw*.28,oh*.08,0,0,Math.PI*2);
    c.fillStyle='rgba(240,190,150,0.22)'; c.fill();
  }
  c.restore();
}

// ── Stubble ───────────────────────────────────────────────────────────────────────
function drawStubble(cy){
  c.save();
  c.globalAlpha=0.085;
  // Jaw stubble region
  const points=[
    [CX-75,cy+70],[CX-65,cy+90],[CX-52,cy+108],[CX-38,cy+120],[CX-22,cy+130],
    [CX,cy+134],[CX+22,cy+130],[CX+38,cy+120],[CX+52,cy+108],[CX+65,cy+90],
    [CX+75,cy+70],[CX+60,cy+60],[CX+40,cy+50],[CX+20,cy+44],[CX,cy+42],
    [CX-20,cy+44],[CX-40,cy+50],[CX-60,cy+60],
  ];
  for(const [px,py] of points){
    for(let i=0;i<3;i++){
      const dx=(Math.random()-.5)*18, dy=(Math.random()-.5)*10;
      c.beginPath();
      c.arc(px+dx,py+dy,0.9,0,Math.PI*2);
      c.fillStyle='#1A0C04'; c.fill();
    }
  }
  c.restore();
}

// ── Render ─────────────────────────────────────────────────────────────────────
const LEX=CX-44, REX=CX+44;
const EYR=CY-48, BROW_Y=CY-72;

// Character Y center — positioned to show bust
const charCY=165;

function frame(t){
  c.clearRect(0,0,W,H);

  bp+=.016; sp+=.007;
  const dy=getOY();
  M.o+=(M.to-M.o)*.22; M.w+=(M.tw-M.w)*.22;
  tickBlink(t); tickEye(t);
  const bsc=blS();
  const cy=charCY+dy;

  // Head tilt pivot at character face center
  c.save();
  c.translate(CX,cy); c.rotate(getTilt()); c.translate(-CX,-cy);

  drawBg();
  drawHairBack(cy);
  drawOutfit(cy);
  drawNeck(cy);
  drawEars(cy);
  drawFace(cy);
  drawStubble(cy);
  drawNose(cy);
  drawEyebrow(LEX,BROW_Y+dy);
  drawEyebrow(REX,BROW_Y+dy);
  drawEye(LEX,EYR+dy,bsc,false);
  drawEye(REX,EYR+dy,bsc,true);
  drawMouth(cy,M.o,M.w);
  drawHairTop(cy);

  c.restore();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ── Status ─────────────────────────────────────────────────────────────────────
const ST={
  listening: {col:'#4ADE80',bg:'rgba(74,222,128,.08)', bd:'rgba(74,222,128,.24)',txt:'Listening'},
  processing:{col:'#FCD34D',bg:'rgba(252,211,77,.08)', bd:'rgba(252,211,77,.24)', txt:'Processing'},
  speaking:  {col:'#60A5FA',bg:'rgba(96,165,250,.08)', bd:'rgba(96,165,250,.24)', txt:'Speaking'},
  idle:      {col:'#5A6080',bg:'rgba(90,96,128,.06)',  bd:'rgba(90,96,128,.16)',  txt:'Idle'},
};
const spill=document.getElementById('spill');
const stxt=document.getElementById('stxt');
const wbars=document.getElementById('wbars');
function setStatus(v){
  const s=ST[v]||ST.idle;
  spill.style.color=s.col; spill.style.background=s.bg; spill.style.borderColor=s.bd;
  stxt.textContent=s.txt; spill.className=v;
  wbars.classList.toggle('on',v==='speaking');
}
setStatus('listening');

// ── Chat ───────────────────────────────────────────────────────────────────────
const box=document.getElementById('msgs');
let started=false;
function addMsg(role,text){
  if(!started){box.innerHTML='';started=true;}
  const row=document.createElement('div'); row.className=`row ${role}`;
  const av=document.createElement('div'); av.className=`mav ${role==='user'?'u':'a'}`;
  av.textContent=role==='user'?'You':'AI';
  const bub=document.createElement('div'); bub.className='bub'; bub.textContent=text;
  row.appendChild(av); row.appendChild(bub);
  box.appendChild(row);
  while(box.children.length>60) box.removeChild(box.firstChild);
  box.scrollTop=box.scrollHeight;
}

// ── WebSocket ──────────────────────────────────────────────────────────────────
const connEl=document.getElementById('conn'), clbl=document.getElementById('clbl');
let ws=null, rt=null;
function connect(){
  if(ws&&ws.readyState<=1) return;
  ws=new WebSocket('ws://localhost:8765');
  ws.onopen=()=>{connEl.className='conn on';clbl.textContent='Connected';clearTimeout(rt);};
  ws.onmessage=({data})=>{
    let m; try{m=JSON.parse(data);}catch{return;}
    if(m.type==='viseme')     setViseme(m.viseme,m.amplitude);
    else if(m.type==='status')     setStatus(m.value);
    else if(m.type==='transcript') addMsg(m.role,m.text);
  };
  ws.onerror=()=>{connEl.className='conn err';clbl.textContent='Error';};
  ws.onclose=()=>{connEl.className='conn';clbl.textContent='Reconnecting…';setStatus('idle');rt=setTimeout(connect,2000);};
}
connect();
</script>
